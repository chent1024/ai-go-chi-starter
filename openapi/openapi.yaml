openapi: 3.1.0
info:
  title: AI Go Chi Starter 接口文档
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: 存活探针
      responses:
        '200':
          description: 正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /readyz:
    get:
      summary: 就绪探针
      responses:
        '200':
          description: 已就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '503':
          description: 未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/examples:
    get:
      summary: 获取 example 列表
      responses:
        '200':
          description: example 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '503':
          description: 服务正在 draining 或尚未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
    post:
      summary: 创建 example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExampleRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          description: 请求不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '503':
          description: 服务正在 draining 或尚未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
  /v1/examples/{id}:
    get:
      summary: 按 id 获取 example
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: example 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '503':
          description: 服务正在 draining 或尚未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '504':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
components:
  schemas:
    Envelope:
      type: object
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        retryable:
          type: boolean
        data:
          oneOf:
            - $ref: '#/components/schemas/Example'
            - type: array
              items:
                $ref: '#/components/schemas/Example'
            - type: object
              additionalProperties: true
            - type: 'null'
    CreateExampleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Example:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
