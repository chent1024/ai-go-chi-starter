services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-go-chi-starter-postgres
    restart: unless-stopped
    ports:
      - "${DOCKER_POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_DB:-app}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-app}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_POSTGRES_USER:-app} -d ${DOCKER_POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
